name: Deploy to Production

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build all
        run: pnpm run build
        
      # Add your deployment steps here
      # Examples:
      # - Deploy to Vercel: npx vercel --prod
      # - Deploy to Coolify: curl -X POST $COOLIFY_WEBHOOK
      # - Deploy to VPS: rsync + ssh
      
      - name: Deploy Notification
        run: echo "Deployment completed - configure your deployment provider"
