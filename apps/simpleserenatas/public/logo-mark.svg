<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36" fill="none">
  <!-- Base: slate 950 con acento violet 400 -->
  <rect width="36" height="36" rx="10" fill="#0F172A"/>
  <rect x="0.5" y="0.5" width="35" height="35" rx="9.5" stroke="#A78BFA" stroke-opacity="0.25"/>
  
  <!-- S con ondas sonoras emanando -->
  <g stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- S musical/celebración -->
    <path d="M12 12c4 0 7 2 8 6s-1 6-4 6" />
    <path d="M12 24c-2 0-3-1.5-3-3s1-3 3-3" />
  </g>
  <!-- Ondas sonoras (violet) -->
  <g stroke="#A78BFA" stroke-width="1.5" stroke-linecap="round">
    <!-- Onda izquierda -->
    <path d="M6 12c-1 2-1 4 0 6" opacity="0.8"/>
    <path d="M4 10c-1.5 3-1.5 7 0 10" opacity="0.5"/>
    <!-- Onda derecha -->
    <path d="M30 12c1 2 1 4 0 6" opacity="0.8"/>
    <path d="M32 10c1.5 3 1.5 7 0 10" opacity="0.5"/>
    <!-- Onda central superior -->
    <path d="M15 6c2-1 4-1 6 0" opacity="0.6"/>
  </g>
</svg>
