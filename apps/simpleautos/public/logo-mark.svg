    <line x1="26" y1="8" x2="22" y2="11" opacity="0.8"/>
    <line x1="28" y1="11" x2="24" y2="14" opacity="0.6"/>
    <line x1="30" y1="14" x2="26" y2="17" opacity="0.4"/>
  </g>
</svg>
