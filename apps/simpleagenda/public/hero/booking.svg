    <circle cx="221" cy="126" r="8" fill="#0D9488" fill-opacity="0.3"/>
    <path d="M217 126l3 3 5-5" stroke="#0D9488" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
