    <rect x="44" y="306" width="195" height="34" rx="8" fill="#0D9488" fill-opacity="0.04" stroke="#0D9488" stroke-opacity="0.12"/>
    <text x="60" y="327" fill="#5eead4" font-family="Inter,system-ui,sans-serif" font-size="10" opacity="0.4">Nombre completo</text>
    <rect x="247" y="306" width="195" height="34" rx="8" fill="#0D9488" fill-opacity="0.04" stroke="#0D9488" stroke-opacity="0.12"/>
    <text x="263" y="327" fill="#5eead4" font-family="Inter,system-ui,sans-serif" font-size="10" opacity="0.4">Email</text>

    <!-- CTA button -->
    <rect x="44" y="356" width="398" height="40" rx="10" fill="#0D9488"/>
    <text x="243" y="380" text-anchor="middle" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">Confirmar reserva</text>
