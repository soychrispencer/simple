<svg width="480" height="340" viewBox="0 0 480 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dbg" x1="0" y1="0" x2="480" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f2d2a"/><stop offset="1" stop-color="#0a201e"/>
    </linearGradient>
    <filter id="ds"><feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/></filter>
  </defs>
  <g filter="url(#ds)">
    <rect x="20" y="12" width="440" height="316" rx="16" fill="url(#dbg)" stroke="#0D9488" stroke-opacity="0.18"/>

    <!-- Top KPI row -->
    <g font-family="Inter,system-ui,sans-serif">
      <!-- KPI 1 -->
      <rect x="40" y="32" width="122" height="72" rx="10" fill="#0D9488" fill-opacity="0.06" stroke="#0D9488" stroke-opacity="0.12"/>
      <text x="56" y="52" fill="#5eead4" font-size="9" font-weight="500" opacity="0.6">Citas este mes</text>
      <text x="56" y="78" fill="#c2f5ea" font-size="24" font-weight="700">28</text>
      <text x="86" y="78" fill="#34d399" font-size="9" font-weight="600">+12%</text>

      <!-- KPI 2 -->
      <rect x="172" y="32" width="122" height="72" rx="10" fill="#0D9488" fill-opacity="0.06" stroke="#0D9488" stroke-opacity="0.12"/>
      <text x="188" y="52" fill="#5eead4" font-size="9" font-weight="500" opacity="0.6">Pacientes activos</text>
      <text x="188" y="78" fill="#c2f5ea" font-size="24" font-weight="700">14</text>
      <text x="214" y="78" fill="#34d399" font-size="9" font-weight="600">+3</text>

      <!-- KPI 3 -->
      <rect x="304" y="32" width="136" height="72" rx="10" fill="#0D9488" fill-opacity="0.06" stroke="#0D9488" stroke-opacity="0.12"/>
      <text x="320" y="52" fill="#5eead4" font-size="9" font-weight="500" opacity="0.6">Ingresos del mes</text>
      <text x="320" y="78" fill="#c2f5ea" font-size="22" font-weight="700">$840k</text>
      <text x="380" y="78" fill="#34d399" font-size="9" font-weight="600">+8%</text>
    </g>

    <!-- Mini chart area -->
    <rect x="40" y="118" width="260" height="120" rx="10" fill="#0D9488" fill-opacity="0.04" stroke="#0D9488" stroke-opacity="0.1"/>
    <text x="56" y="140" fill="#5eead4" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" opacity="0.6">Citas por semana</text>
    <!-- Chart bars -->
    <g opacity="0.8">
      <rect x="68" y="190" width="20" height="28" rx="4" fill="#0D9488" fill-opacity="0.3"/>
      <rect x="98" y="174" width="20" height="44" rx="4" fill="#0D9488" fill-opacity="0.4"/>
      <rect x="128" y="182" width="20" height="36" rx="4" fill="#0D9488" fill-opacity="0.35"/>
      <rect x="158" y="162" width="20" height="56" rx="4" fill="#0D9488" fill-opacity="0.5"/>
      <rect x="188" y="152" width="20" height="66" rx="4" fill="#0D9488"/>
      <rect x="218" y="168" width="20" height="50" rx="4" fill="#0D9488" fill-opacity="0.45"/>
      <rect x="248" y="178" width="20" height="40" rx="4" fill="#0D9488" fill-opacity="0.35"/>
    </g>
    <!-- Week labels -->
    <g fill="#5eead4" font-family="Inter,system-ui,sans-serif" font-size="8" opacity="0.4" text-anchor="middle">
      <text x="78" y="228">S1</text><text x="108" y="228">S2</text><text x="138" y="228">S3</text>
      <text x="168" y="228">S4</text><text x="198" y="228">S5</text><text x="228" y="228">S6</text><text x="258" y="228">S7</text>
    </g>

    <!-- Right sidebar - today's schedule -->
    <rect x="312" y="118" width="128" height="120" rx="10" fill="#0D9488" fill-opacity="0.04" stroke="#0D9488" stroke-opacity="0.1"/>
    <text x="328" y="140" fill="#5eead4" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" opacity="0.6">Hoy</text>
    <!-- Mini appointment items -->
    <rect x="324" y="150" width="104" height="24" rx="6" fill="#0D9488" fill-opacity="0.1"/>
    <circle cx="337" cy="162" r="6" fill="#0D9488" fill-opacity="0.3"/>
    <text x="348" y="165" fill="#c2f5ea" font-family="Inter,system-ui,sans-serif" font-size="8">10:00 M. Lopez</text>

    <rect x="324" y="180" width="104" height="24" rx="6" fill="#f59e0b" fill-opacity="0.08"/>
    <circle cx="337" cy="192" r="6" fill="#f59e0b" fill-opacity="0.3"/>
    <text x="348" y="195" fill="#c2f5ea" font-family="Inter,system-ui,sans-serif" font-size="8">11:30 J. Reyes</text>

    <rect x="324" y="210" width="104" height="24" rx="6" fill="#0D9488" fill-opacity="0.1"/>
    <circle cx="337" cy="222" r="6" fill="#0D9488" fill-opacity="0.3"/>
    <text x="348" y="225" fill="#c2f5ea" font-family="Inter,system-ui,sans-serif" font-size="8">14:00 C. Perez</text>

    <!-- Bottom row - recent activity -->
    <rect x="40" y="252" width="400" height="60" rx="10" fill="#0D9488" fill-opacity="0.04" stroke="#0D9488" stroke-opacity="0.1"/>
    <text x="56" y="272" fill="#5eead4" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" opacity="0.6">Actividad reciente</text>
    <circle cx="56" cy="293" r="4" fill="#34d399"/>
    <text x="68" y="296" fill="#c2f5ea" font-family="Inter,system-ui,sans-serif" font-size="9">Nueva reserva: Maria Lopez — Mie 8, 10:00</text>
    <text x="360" y="296" fill="#5eead4" font-family="Inter,system-ui,sans-serif" font-size="8" opacity="0.5">hace 2 min</text>
  </g>
</svg>
