<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36" fill="none">
  <!-- Base: slate 950 con acento rose 400 -->
  <rect width="36" height="36" rx="10" fill="#0F172A"/>
  <rect x="0.5" y="0.5" width="35" height="35" rx="9.5" stroke="#FB7185" stroke-opacity="0.25"/>
  
  <!-- S con anillo circular (tiempo, ciclos, continuidad) -->
  <g stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- S central -->
    <path d="M12 14h7c1.5 0 2.5 1 2.5 2.5s-1 2.5-2.5 2.5h-7c-1.5 0-2.5 1-2.5 2.5s1 2.5 2.5 2.5h7" />
  </g>
  <!-- Anillo circular (ciclo de tiempo) -->
  <circle cx="18" cy="18" r="11" stroke="#FB7185" stroke-width="1.5" stroke-opacity="0.5" stroke-dasharray="4 4"/>
  <circle cx="18" cy="18" r="13" stroke="#FB7185" stroke-width="1" stroke-opacity="0.25"/>
</svg>
