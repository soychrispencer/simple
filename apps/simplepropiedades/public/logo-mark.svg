<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36" fill="none">
  <!-- Base: slate 950 con acento teal 400 -->
  <rect width="36" height="36" rx="10" fill="#0F172A"/>
  <rect x="0.5" y="0.5" width="35" height="35" rx="9.5" stroke="#2DD4BF" stroke-opacity="0.25"/>
  
  <!-- S con estructura de cuadrícula (arquitectura, planos) -->
  <g stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- S elegante -->
    <path d="M11 13h9c2 0 3 1 3 2.5s-1 2.5-3 2.5h-9c-2 0-3 1-3 2.5s1 2.5 3 2.5h9" />
  </g>
  <!-- Grid/plano de fondo (teal) -->
  <g stroke="#2DD4BF" stroke-width="1" stroke-opacity="0.4">
    <line x1="8" y1="9" x2="8" y2="27"/>
    <line x1="28" y1="9" x2="28" y2="27"/>
    <line x1="8" y1="9" x2="28" y2="9"/>
    <line x1="8" y1="27" x2="28" y2="27"/>
  </g>
  <!-- Intersecciones del grid -->
  <circle cx="8" cy="9" r="1.5" fill="#2DD4BF" opacity="0.6"/>
  <circle cx="28" cy="9" r="1.5" fill="#2DD4BF" opacity="0.6"/>
  <circle cx="8" cy="27" r="1.5" fill="#2DD4BF" opacity="0.6"/>
  <circle cx="28" cy="27" r="1.5" fill="#2DD4BF" opacity="0.6"/>
</svg>
