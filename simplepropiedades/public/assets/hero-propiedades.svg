<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background gradient -->
  <rect width="1920" height="1080" fill="url(#heroGradient)"/>

  <!-- Geometric shapes for visual interest -->
  <circle cx="300" cy="200" r="80" fill="rgba(255,255,255,0.1)" filter="url(#blur)"/>
  <circle cx="1600" cy="300" r="120" fill="rgba(255,255,255,0.08)" filter="url(#blur)"/>
  <circle cx="800" cy="800" r="100" fill="rgba(255,255,255,0.06)" filter="url(#blur)"/>

  <!-- Simple building silhouettes -->
  <rect x="200" y="600" width="60" height="200" fill="rgba(0,0,0,0.2)"/>
  <rect x="280" y="550" width="60" height="250" fill="rgba(0,0,0,0.2)"/>
  <rect x="360" y="500" width="60" height="300" fill="rgba(0,0,0,0.2)"/>
  <rect x="440" y="520" width="60" height="280" fill="rgba(0,0,0,0.2)"/>

  <!-- City skyline in distance -->
  <rect x="600" y="650" width="40" height="150" fill="rgba(0,0,0,0.15)"/>
  <rect x="660" y="620" width="40" height="180" fill="rgba(0,0,0,0.15)"/>
  <rect x="720" y="600" width="40" height="200" fill="rgba(0,0,0,0.15)"/>
  <rect x="780" y="580" width="40" height="220" fill="rgba(0,0,0,0.15)"/>
  <rect x="840" y="630" width="40" height="170" fill="rgba(0,0,0,0.15)"/>

  <!-- Overlay text area (transparent) -->
  <rect x="0" y="0" width="1920" height="1080" fill="rgba(0,0,0,0.3)"/>
</svg>